services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_shopping_list
      POSTGRES_USER: shopping
      POSTGRES_PASSWORD: shopping
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping -d open_shopping_list"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/open_shopping_list
      DB_USERNAME: shopping
      DB_PASSWORD: shopping
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"
