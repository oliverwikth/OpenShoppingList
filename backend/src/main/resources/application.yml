spring:
  application:
    name: open-shopping-list
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/open_shopping_list}
    username: ${DB_USERNAME:shopping}
    password: ${DB_PASSWORD:shopping}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    se.openshoppinglist: INFO

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:8081
  retailer:
    willys:
      base-url: https://www.willys.se
      search-path: /search
      product-path: /axfood/rest/p/{code}
      connect-timeout: 3s
      read-timeout: 6s
      max-results: 12
